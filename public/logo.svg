<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Top-left corner block (terracotta accent) -->
  <rect x="2" y="2" width="11" height="11" rx="2.5" fill="#A8431E"/>
  <rect x="4.5" y="4.5" width="6" height="6" rx="1" fill="#FAF8F4"/>
  <rect x="6" y="6" width="3" height="3" rx="0.5" fill="#A8431E"/>

  <!-- Top-right corner block (near-black) -->
  <rect x="19" y="2" width="11" height="11" rx="2.5" fill="#1C1B19"/>
  <rect x="21.5" y="4.5" width="6" height="6" rx="1" fill="#FAF8F4"/>
  <rect x="23" y="6" width="3" height="3" rx="0.5" fill="#1C1B19"/>

  <!-- Bottom-left corner block (near-black) -->
  <rect x="2" y="19" width="11" height="11" rx="2.5" fill="#1C1B19"/>
  <rect x="4.5" y="21.5" width="6" height="6" rx="1" fill="#FAF8F4"/>
  <rect x="6" y="23" width="3" height="3" rx="0.5" fill="#1C1B19"/>

  <!-- Data modules (bottom-right quadrant) -->
  <rect x="19" y="19" width="4" height="4" rx="1" fill="#A8431E"/>
  <rect x="25" y="19" width="4" height="4" rx="1" fill="#1C1B19"/>
  <rect x="19" y="25" width="4" height="4" rx="1" fill="#1C1B19"/>
  <rect x="25" y="25" width="4" height="4" rx="1" fill="#A8431E"/>

  <!-- Horizontal data strip (center column) -->
  <rect x="15" y="2" width="3" height="3" rx="0.75" fill="#1C1B19"/>
  <rect x="15" y="7" width="3" height="3" rx="0.75" fill="#A8431E"/>
  <rect x="15" y="12" width="3" height="3" rx="0.75" fill="#1C1B19"/>

  <!-- Vertical data strip (center row) -->
  <rect x="2" y="15" width="3" height="3" rx="0.75" fill="#A8431E"/>
  <rect x="7" y="15" width="3" height="3" rx="0.75" fill="#1C1B19"/>
  <rect x="12" y="15" width="3" height="3" rx="0.75" fill="#1C1B19"/>

  <!-- Center data point -->
  <rect x="15" y="15" width="3" height="3" rx="0.75" fill="#A8431E"/>
</svg>